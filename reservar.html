<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ma Chère — Reserva tu cita</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,700;1,300;1,400&family=Open+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --cream:#FAF6F0;
  --ivory:#F2EBE0;
  --gold:#C9A96E;
  --gold2:#A07840;
  --dark:#1A1714;
  --charcoal:#2D2926;
  --muted:#8a7550;
  --border:rgba(201,169,110,0.3);
  --ok:#5c7a5c;
  --warn:#b8543e;
}
html{scroll-behavior:smooth}
body{font-family:'Open Sans',sans-serif;background:var(--cream);color:var(--dark);min-height:100vh}
h1,h2,h3,h4{font-family:'Playfair Display',serif;font-weight:400}
em{font-style:italic;color:var(--gold2)}
button{font-family:'Open Sans',sans-serif;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:'Open Sans',sans-serif;font-size:14px;background:var(--cream);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--dark);width:100%;outline:none;transition:border-color .25s}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600;display:block;margin-bottom:6px}
.field{margin-bottom:16px}

/* BACK BAR */
.back-bar{display:flex;align-items:center;gap:8px;padding:12px 28px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600;background:var(--ivory);border-bottom:1px solid var(--border);text-decoration:none;transition:color .2s}
.back-bar:hover{color:var(--gold2)}
.back-bar .arrow{font-size:15px;line-height:1}

/* NAV */
.topbar{position:sticky;top:0;z-index:50;background:var(--cream);border-bottom:1px solid var(--border);padding:18px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.logo{font-size:19px;letter-spacing:.14em;color:var(--dark)}
.tabs{display:flex;gap:6px;background:var(--ivory);border-radius:24px;padding:4px}
.tab-btn{font-size:10px;letter-spacing:.16em;text-transform:uppercase;padding:10px 20px;border-radius:20px;color:var(--muted);font-weight:600;transition:all .25s}
.tab-btn.active{background:var(--gold);color:var(--cream)}

main{max-width:1000px;margin:0 auto;padding:40px 24px 100px}
.view{display:none}
.view.active{display:block}
.hidden{display:none !important}

.page-head{margin-bottom:36px;text-align:center}
.page-head h1{font-size:clamp(28px,4vw,42px);margin-bottom:8px}
.page-head p{color:var(--muted);font-style:italic;font-size:14px}

/* STEPS */
.steps{display:flex;justify-content:center;gap:28px;margin-bottom:40px}
.step-dot{display:flex;align-items:center;gap:10px;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--border);font-weight:600}
.step-dot .n{width:24px;height:24px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-style:italic;font-size:13px}
.step-dot.active{color:var(--dark)}
.step-dot.active .n{background:var(--gold);border-color:var(--gold);color:var(--cream)}
.step-dot.done .n{background:var(--charcoal);border-color:var(--charcoal);color:var(--cream)}

/* CATEGORY FILTER */
.cat-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;justify-content:center}
.cat-chip{font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:9px 16px;border-radius:18px;border:1px solid var(--border);color:var(--muted);font-weight:600;background:var(--ivory);transition:all .2s}
.cat-chip:hover{border-color:var(--gold)}
.cat-chip.sel{background:var(--gold);border-color:var(--gold);color:var(--cream)}
.cat-group{margin-bottom:32px}
.cat-group h3{font-size:15px;letter-spacing:.06em;color:var(--gold2);margin-bottom:12px;text-transform:uppercase;font-weight:600;font-family:'Open Sans',sans-serif}
.svc-card .cat-tag{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold2);font-weight:700;margin-bottom:4px}

/* SERVICE CARDS */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.svc-card{background:var(--ivory);border:1px solid var(--border);border-radius:14px;padding:22px;text-align:left;transition:all .25s;position:relative}
.svc-card:hover{border-color:var(--gold);transform:translateY(-2px)}
.svc-card.sel{border-color:var(--gold);background:#efe0bf;box-shadow:0 0 0 1px var(--gold)}
.svc-card h4{font-size:18px;margin-bottom:6px}
.svc-card .dur{font-size:11px;color:var(--muted);margin-bottom:10px}
.svc-card .price{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold2)}

.empty{text-align:center;padding:60px 20px;color:var(--muted);font-style:italic}
.empty .big{font-size:15px;margin-bottom:6px;color:var(--dark);font-style:normal;font-weight:600}

/* DATE STRIP */
.date-strip{display:flex;gap:10px;overflow-x:auto;padding:6px 2px 16px}
.date-chip{flex-shrink:0;width:64px;padding:12px 4px;border:1px solid var(--border);border-radius:12px;text-align:center;background:var(--ivory);transition:all .2s}
.date-chip .dow{font-size:10px;text-transform:uppercase;color:var(--muted);letter-spacing:.08em}
.date-chip .num{font-family:'Playfair Display',serif;font-size:20px;margin:2px 0}
.date-chip.sel{background:var(--gold);border-color:var(--gold)}
.date-chip.sel .dow,.date-chip.sel .num{color:var(--cream)}
.date-chip.closed{opacity:.35;pointer-events:none}

/* TIME SLOTS */
.slot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:10px}
.slot-btn{padding:11px 4px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--cream);transition:all .2s}
.slot-btn:hover{border-color:var(--gold)}
.slot-btn.sel{background:var(--gold);color:var(--cream);border-color:var(--gold)}
.slot-btn:disabled{opacity:.3;pointer-events:none;text-decoration:line-through}

/* BUTTONS */
.btn{font-size:10px;letter-spacing:.18em;text-transform:uppercase;padding:14px 34px;border-radius:22px;font-weight:600;transition:all .3s;display:inline-block}
.btn-gold{background:var(--gold);color:var(--cream)}
.btn-gold:hover{background:var(--gold2)}
.btn-gold:disabled{opacity:.4;pointer-events:none}
.btn-dark{background:var(--dark);color:var(--ivory)}
.btn-dark:hover{background:var(--charcoal)}
.btn-ghost{border:1px solid var(--border);color:var(--muted)}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold2)}
.btn-sm{padding:9px 18px;font-size:9px}
.btn-danger{color:var(--warn)}
.row-btns{display:flex;gap:12px;justify-content:center;margin-top:32px;flex-wrap:wrap}

.card{background:var(--ivory);border:1px solid var(--border);border-radius:14px;padding:26px}

/* PANEL */
.panel-nav{display:flex;gap:8px;margin-bottom:28px;border-bottom:1px solid var(--border);padding-bottom:0}
.panel-nav button{font-size:10px;letter-spacing:.16em;text-transform:uppercase;padding:12px 4px;margin-right:24px;color:var(--muted);font-weight:600;border-bottom:2px solid transparent}
.panel-nav button.active{color:var(--dark);border-color:var(--gold)}

.pin-box{max-width:320px;margin:80px auto;text-align:center}
.pin-box h2{margin-bottom:20px}

/* AGENDA LIST */
.agenda-day-head{display:flex;align-items:center;gap:16px;margin-bottom:20px}
.booking-item{display:flex;gap:16px;align-items:center;padding:16px 18px;border:1px solid var(--border);border-radius:12px;margin-bottom:10px;background:var(--ivory)}
.booking-item .time{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold2);width:64px;flex-shrink:0}
.booking-item .info{flex:1;min-width:0}
.booking-item .info b{display:block;font-size:14px}
.booking-item .info span{font-size:12px;color:var(--muted)}
.status-badge{font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:5px 10px;border-radius:10px;font-weight:700}
.status-confirmada{background:#dde8dd;color:var(--ok)}
.status-completada{background:#e4e4e4;color:#666}
.status-cancelada{background:#f2d9d3;color:var(--warn)}
.booking-actions{display:flex;gap:8px}
.icon-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s}
.icon-btn:hover{border-color:var(--gold);background:var(--gold);color:var(--cream)}

/* CLIENTS */
.client-list{display:flex;flex-direction:column;gap:8px}
.client-row{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border:1px solid var(--border);border-radius:12px;background:var(--ivory);transition:all .2s}
.client-row:hover{border-color:var(--gold)}
.client-row b{font-size:14px}
.client-row span{font-size:12px;color:var(--muted)}
.client-detail{margin-top:10px}
.hist-item{display:flex;justify-content:space-between;font-size:13px;padding:9px 0;border-bottom:1px solid var(--border)}
.hist-item:last-child{border-bottom:none}

/* SERVICES ADMIN */
.svc-row{display:grid;grid-template-columns:1.8fr 1.6fr 1fr 1fr auto;gap:12px;align-items:center;padding:14px 16px;border:1px solid var(--border);border-radius:12px;background:var(--ivory);margin-bottom:8px}
.svc-row input,.svc-row select{padding:8px 10px}
.add-svc-card{border:1px dashed var(--border);border-radius:12px;padding:20px;margin-top:20px}
.grid3{display:grid;grid-template-columns:1.6fr 1.4fr 1fr 1fr;gap:12px}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.settings-row{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end}
.settings-row .field{flex:1;min-width:120px}
.day-toggle{display:flex;gap:6px;flex-wrap:wrap}
.day-toggle button{width:38px;height:38px;border-radius:50%;border:1px solid var(--border);font-size:11px;font-weight:600}
.day-toggle button.on{background:var(--gold);color:var(--cream);border-color:var(--gold)}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--dark);color:var(--ivory);padding:14px 26px;border-radius:24px;font-size:13px;opacity:0;transition:all .35s;pointer-events:none;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.confirm-box{text-align:center;padding:40px 20px}
.confirm-box .mark{width:56px;height:56px;border-radius:50%;background:var(--gold);color:var(--cream);display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 22px}

/* MULTI-SERVICE SELECTION */
.svc-card .check{position:absolute;top:14px;right:14px;width:20px;height:20px;border-radius:50%;border:1px solid var(--border);background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent}
.svc-card.sel .check{background:var(--gold);border-color:var(--gold);color:var(--cream)}
.selection-bar{position:sticky;bottom:0;background:var(--cream);border-top:1px solid var(--border);padding:14px 0;margin-top:10px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.selection-bar .sum{font-size:13px;color:var(--muted)}
.selection-bar .sum b{color:var(--dark);font-family:'Playfair Display',serif;font-size:16px}

/* EMPLOYEE CHIPS */
.emp-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.emp-chip{font-size:11px;letter-spacing:.06em;padding:10px 18px;border-radius:18px;border:1px solid var(--border);color:var(--muted);font-weight:600;background:var(--ivory)}
.emp-chip.sel{background:var(--gold);border-color:var(--gold);color:var(--cream)}

/* AGENDA 2 EMPLOYEES */
.agenda-cols{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.agenda-col h4{font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold2);margin-bottom:12px;font-family:'Open Sans',sans-serif;font-weight:700;border-bottom:1px solid var(--border);padding-bottom:8px}
@media(max-width:760px){.agenda-cols{grid-template-columns:1fr}}
.booking-item{flex-wrap:wrap}
.booking-item .emp-select{width:auto;font-size:11px;padding:6px 8px;margin-top:6px}
.svc-tags{font-size:12px;color:var(--muted);display:block;margin-top:2px}

/* MODAL (cobro / añadir servicio) */
.modal-overlay{position:fixed;inset:0;background:rgba(26,23,20,.55);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal-box{background:var(--cream);border-radius:16px;padding:26px;max-width:420px;width:100%;max-height:85vh;overflow-y:auto}
.modal-box h3{margin-bottom:16px}
.calc-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.calc-row.total{font-family:'Playfair Display',serif;font-size:19px;color:var(--gold2);border-bottom:none;margin-top:6px;padding-top:14px;border-top:1px solid var(--border)}
.calc-adjust{display:flex;gap:12px;margin:14px 0}
.calc-adjust .field{flex:1;margin-bottom:0}
.pickable-svc{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;background:var(--ivory);font-size:13px}
.pickable-svc button{font-size:9px;letter-spacing:.1em;text-transform:uppercase;background:var(--gold);color:var(--cream);padding:7px 12px;border-radius:14px;font-weight:700}

@media(max-width:640px){
  .two-col{grid-template-columns:1fr}
  .grid3{grid-template-columns:1fr}
  .svc-row{grid-template-columns:1fr 1fr}
  .topbar{padding:14px 16px}
  main{padding:24px 14px 90px}
}
</style>
</head>
<body>

<a href="index.html" class="back-bar"><span class="arrow">←</span> Volver a página principal</a>

<div class="topbar">
  <div class="logo">Ma Ch<em>è</em>re · Reservas</div>
</div>

<main>

  <section class="view active" id="view-reservar">
    <div class="page-head">
      <h1>Reserva tu <em>cita</em></h1>
      <p>Elige servicio, día y hora — te confirmamos al instante</p>
    </div>

    <div class="steps">
      <div class="step-dot active" data-step="1"><span class="n">1</span> Servicio</div>
      <div class="step-dot" data-step="2"><span class="n">2</span> Fecha y hora</div>
      <div class="step-dot" data-step="3"><span class="n">3</span> Tus datos</div>
    </div>

    <div id="book-step-1">
      <div id="cat-filter" class="cat-filter"></div>
      <div id="svc-cards"></div>
      <div class="selection-bar">
        <div class="sum" id="svc-selection-sum">Elige uno o varios servicios</div>
        <button class="btn btn-gold" id="btn-continuar-svc" onclick="goToStep2()" disabled>Continuar</button>
      </div>
    </div>

    <div id="book-step-2" class="hidden">
      <h3 style="margin-bottom:14px">¿Con quién prefieres tu cita?</h3>
      <div id="emp-filter" class="emp-filter"></div>
      <h3 style="margin-bottom:14px">Elige un día</h3>
      <div id="date-strip" class="date-strip"></div>
      <h3 style="margin:22px 0 14px">Horas disponibles</h3>
      <div id="slot-grid" class="slot-grid"></div>
      <div class="row-btns">
        <button class="btn btn-ghost" onclick="goStep(1)">Atrás</button>
      </div>
    </div>

    <div id="book-step-3" class="hidden">
      <div class="card" style="max-width:460px;margin:0 auto">
        <div class="field">
          <label>Nombre y apellidos</label>
          <input id="f-nombre" placeholder="Ej. Laura Gómez">
        </div>
        <div class="field">
          <label>Teléfono</label>
          <input id="f-telefono" placeholder="Ej. 600 123 456">
        </div>
        <div class="field">
          <label>Email (opcional)</label>
          <input id="f-email" placeholder="tucorreo@ejemplo.com">
        </div>
        <div class="field">
          <label>Notas para el centro (opcional)</label>
          <textarea id="f-notas" rows="2" placeholder="Alguna alergia, preferencia..."></textarea>
        </div>
        <div id="book-summary" style="font-size:13px;color:var(--muted);margin-bottom:6px"></div>
      </div>
      <div class="row-btns">
        <button class="btn btn-ghost" onclick="goStep(2)">Atrás</button>
        <button class="btn btn-gold" id="btn-confirmar" onclick="confirmarReserva()">Confirmar reserva</button>
      </div>
    </div>

    <div id="book-step-4" class="hidden">
      <div class="confirm-box">
        <div class="mark">✓</div>
        <h2>¡Reserva confirmada!</h2>
        <p id="confirm-text" style="color:var(--muted);font-style:italic;margin-top:10px"></p>
        <div class="row-btns"><button class="btn btn-gold" onclick="resetBooking()">Hacer otra reserva</button></div>
      </div>
    </div>
  </section>

</main>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
/* ============ FIREBASE ============ */
const firebaseConfig = {
  apiKey: "AIzaSyB8VN6sm1XpBn4sTAVCHLMg5mrWaJObhkY",
  authDomain: "machereagenda.firebaseapp.com",
  projectId: "machereagenda",
  storageBucket: "machereagenda.firebasestorage.app",
  messagingSenderId: "264453428542",
  appId: "1:264453428542:web:9e16d6e73dfbe240e6086f"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const svcCol = db.collection('services');
const cliCol = db.collection('clients');
const bkCol = db.collection('bookings');
const setDoc = db.collection('settings').doc('config');

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2600);
}
function euros(n){ return Number(n).toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:2})+' €'; }
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

/* ============ STATE ============ */
let services = [];
let bookings = [];
let settings = { schedule:null, slot:30, employees:['Empleada 1','Empleada 2'] };
const DEFAULT_SCHEDULE = {
  1: [{open:'16:00',close:'21:00'}],
  2: [{open:'10:00',close:'14:00'},{open:'15:00',close:'21:00'}],
  3: [{open:'10:00',close:'14:00'},{open:'15:00',close:'21:00'}],
  4: [{open:'10:00',close:'14:00'},{open:'15:00',close:'21:00'}],
  5: [{open:'10:00',close:'14:00'},{open:'15:00',close:'21:00'}],
  6: [{open:'10:00',close:'14:00'},{open:'15:00',close:'21:00'}],
};
function daySchedule(dow){ return (settings.schedule && settings.schedule[dow]) || []; }
function isDayClosed(dow){ return daySchedule(dow).length===0; }

let bookingState = { serviceIds:[], date:null, time:null, employee:'cualquiera' };

const DOW = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const CATS = {
  peluqueria:   { label:'Peluquería' },
  barberia:     { label:'Barbería' },
  unas:         { label:'Uñas' },
  estetica:     { label:'Estética' },
  micro:        { label:'Micro' },
  pestanas:     { label:'Pestañas' },
  otros:        { label:'Otros' },
  extras:       { label:'Extras' },
};
const CATEGORY_ORDER = ['peluqueria','barberia','unas','estetica','micro','pestanas','otros','extras'];
function catLabel(cat){ return (CATS[cat] && CATS[cat].label) || 'Otros'; }
let categoryFilter = 'todas';
function fmtDate(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function fmtDateLabel(d){ return d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'}); }

/* ============ INIT (Firestore en tiempo real) ============ */
function init(){
  svcCol.onSnapshot(snap=>{
    services = snap.docs.map(d=>({ id:d.id, ...d.data() })).filter(s=>s.publico!==false);
    renderCatFilter();
    renderServiceCards();
    updateSvcSelectionBar();
    renderSlots();
  }, err=>showToast('Error al leer servicios: revisa las reglas de Firestore'));

  bkCol.onSnapshot(snap=>{
    bookings = snap.docs.map(d=>({ id:d.id, ...d.data() }));
    renderSlots();
  }, err=>showToast('Error al leer reservas'));

  setDoc.onSnapshot(doc=>{
    if(doc.exists) settings = { ...settings, ...doc.data() };
    if(!settings.schedule) settings.schedule = JSON.parse(JSON.stringify(DEFAULT_SCHEDULE));
    renderDateStrip();
    renderSlots();
  }, err=>showToast('Error al leer horario'));
}
init();

/* ============ STEP NAV (booking) ============ */
function goStep(n){
  [1,2,3,4].forEach(i=>{
    document.getElementById('book-step-'+i).classList.toggle('hidden', i!==n);
  });
  document.querySelectorAll('.step-dot').forEach(d=>{
    const s = Number(d.dataset.step);
    d.classList.toggle('active', s===n);
    d.classList.toggle('done', s<n);
  });
}

/* ============ SERVICE CARDS (public) ============ */
function renderCatFilter(){
  const el = document.getElementById('cat-filter');
  if(!el) return;
  const present = CATEGORY_ORDER.filter(c=>services.some(s=>(s.cat||'otros')===c));
  if(present.length===0){ el.innerHTML=''; return; }
  const chips = ['todas', ...present];
  el.innerHTML = chips.map(c=>`
    <button class="cat-chip ${categoryFilter===c?'sel':''}" onclick="setCategoryFilter('${c.replace(/'/g,"\\'")}')">${c==='todas'?'Todas':catLabel(c)}</button>
  `).join('');
}
function setCategoryFilter(c){
  categoryFilter = c;
  renderCatFilter();
  renderServiceCards();
}
function renderServiceCards(){
  const el = document.getElementById('svc-cards');
  if(services.length===0){
    el.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="big">Aún no hay servicios cargados</div>Vuelve a intentarlo en unos minutos</div>`;
    return;
  }
  const cardHtml = s => `
    <button class="svc-card ${bookingState.serviceIds.includes(s.id)?'sel':''}" onclick="selectService('${s.id}')">
      <span class="check">✓</span>
      <div class="cat-tag">${escapeHtml(catLabel(s.cat))}</div>
      <h4>${escapeHtml(s.nombre)}</h4>
      <div class="dur">${s.duracion} min</div>
      <div class="price">${euros(s.precio)}</div>
    </button>
  `;

  if(categoryFilter !== 'todas'){
    const filtered = services.filter(s=>(s.cat||'otros')===categoryFilter);
    el.innerHTML = filtered.length
      ? `<div class="card-grid">${filtered.map(cardHtml).join('')}</div>`
      : `<div class="empty" style="grid-column:1/-1">No hay servicios en esta categoría</div>`;
    return;
  }

  const grouped = {};
  services.forEach(s=>{
    const cat = s.cat || 'otros';
    (grouped[cat] = grouped[cat] || []).push(s);
  });
  const cats = CATEGORY_ORDER.filter(c=>grouped[c] && grouped[c].length);
  el.innerHTML = cats.map(cat => `
    <div class="cat-group">
      <h3>${catLabel(cat)}</h3>
      <div class="card-grid">${grouped[cat].map(cardHtml).join('')}</div>
    </div>
  `).join('');
}
function selectService(id){
  const i = bookingState.serviceIds.indexOf(id);
  if(i>-1) bookingState.serviceIds.splice(i,1);
  else bookingState.serviceIds.push(id);
  renderServiceCards();
  updateSvcSelectionBar();
}
function updateSvcSelectionBar(){
  const chosen = services.filter(s=>bookingState.serviceIds.includes(s.id));
  const sumEl = document.getElementById('svc-selection-sum');
  const btn = document.getElementById('btn-continuar-svc');
  if(!sumEl || !btn) return;
  if(chosen.length===0){
    sumEl.textContent = 'Elige uno o varios servicios';
    btn.disabled = true;
  } else {
    const totalDur = chosen.reduce((a,s)=>a+Number(s.duracion||0),0);
    const totalPrice = chosen.reduce((a,s)=>a+Number(s.precio||0),0);
    sumEl.innerHTML = `${chosen.length} servicio${chosen.length===1?'':'s'} · ${totalDur} min · <b>${euros(totalPrice)}</b>`;
    btn.disabled = false;
  }
}
function goToStep2(){
  if(bookingState.serviceIds.length===0){ showToast('Elige al menos un servicio'); return; }
  try{
    renderEmpFilter();
    renderDateStrip();
    goStep(2);
  }catch(e){
    console.error('Error en goToStep2:', e);
    showToast('No se pudo continuar: '+e.message);
  }
}

/* ============ EMPLEADAS (público) ============ */
function empList(){
  const emps = Array.isArray(settings.employees) && settings.employees.filter(Boolean).length===2 ? settings.employees : ['Empleada 1','Empleada 2'];
  return emps;
}
function renderEmpFilter(){
  const el = document.getElementById('emp-filter');
  if(!el) return;
  const emps = empList();
  const options = ['cualquiera', ...emps];
  el.innerHTML = options.map(o=>`
    <button class="emp-chip ${bookingState.employee===o?'sel':''}" onclick="selectEmployee('${o.replace(/'/g,"\\'")}')">${o==='cualquiera'?'Sin preferencia':o}</button>
  `).join('');
}
function selectEmployee(name){
  bookingState.employee = name;
  bookingState.time = null;
  renderEmpFilter();
  renderSlots();
}

/* ============ DATE STRIP ============ */
function renderDateStrip(){
  const el = document.getElementById('date-strip');
  if(!el) return;
  let html = '';
  const today = new Date(); today.setHours(0,0,0,0);
  for(let i=0;i<14;i++){
    const d = new Date(today); d.setDate(d.getDate()+i);
    const iso = fmtDate(d);
    const closed = isDayClosed(d.getDay());
    html += `<button class="date-chip ${bookingState.date===iso?'sel':''} ${closed?'closed':''}" onclick="selectDate('${iso}')">
      <div class="dow">${DOW[d.getDay()]}</div>
      <div class="num">${d.getDate()}</div>
    </button>`;
  }
  el.innerHTML = html;
}
function selectDate(iso){
  bookingState.date = iso;
  bookingState.time = null;
  renderDateStrip();
  renderSlots();
}

/* ============ TIME SLOTS ============ */
function toMinutes(hhmm){ const [h,m]=hhmm.split(':').map(Number); return h*60+m; }
function toHHMM(mins){ const h=Math.floor(mins/60), m=mins%60; return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0'); }

function chosenServices(){ return services.filter(s=>bookingState.serviceIds.includes(s.id)); }
function employeeFreeAt(empName, t, dur, dayBookings){
  return !dayBookings.some(b=>{
    if((b.employee||empList()[0]) !== empName) return false;
    const bStart = toMinutes(b.time);
    const bEnd = bStart + Number(b.duration||30);
    return t < bEnd && (t+dur) > bStart;
  });
}
function renderSlots(){
  const el = document.getElementById('slot-grid');
  if(!el) return;
  const chosen = chosenServices();
  if(chosen.length===0 || !bookingState.date){ el.innerHTML=''; return; }
  const d = new Date(bookingState.date+'T00:00:00');
  const ranges = daySchedule(d.getDay());
  const step = Number(settings.slot||30);
  const dur = chosen.reduce((a,s)=>a+Number(s.duracion||30),0);
  const now = new Date();
  const isToday = bookingState.date === fmtDate(now);
  const nowMins = now.getHours()*60+now.getMinutes();

  const dayBookings = bookings.filter(b=>b.date===bookingState.date && b.status!=='cancelada');
  const emps = empList();

  let html = '';
  let any = false;
  ranges.forEach(r=>{
    const start = toMinutes(r.open);
    const end = toMinutes(r.close);
    for(let t=start; t+dur<=end; t+=step){
      const hhmm = toHHMM(t);
      let free;
      if(bookingState.employee && bookingState.employee!=='cualquiera'){
        free = employeeFreeAt(bookingState.employee, t, dur, dayBookings);
      } else {
        free = emps.some(e=>employeeFreeAt(e, t, dur, dayBookings));
      }
      const past = isToday && t <= nowMins;
      const disabled = !free || past;
      if(!disabled) any = true;
      html += `<button class="slot-btn ${bookingState.time===hhmm?'sel':''}" ${disabled?'disabled':''} onclick="selectTime('${hhmm}')">${hhmm}</button>`;
    }
  });
  el.innerHTML = any ? html : `<div class="empty" style="grid-column:1/-1">No quedan huecos este día. Prueba otra fecha.</div>`;
}
function selectTime(hhmm){
  bookingState.time = hhmm;
  renderSlots();
  const chosen = chosenServices();
  const d = new Date(bookingState.date+'T00:00:00');
  const totalPrice = chosen.reduce((a,s)=>a+Number(s.precio||0),0);
  const names = chosen.map(s=>s.nombre).join(', ');
  const empLabel = (bookingState.employee && bookingState.employee!=='cualquiera') ? ` · ${bookingState.employee}` : '';
  document.getElementById('book-summary').innerHTML =
    `<b>${escapeHtml(names)}</b> · ${fmtDateLabel(d)} a las ${hhmm}${empLabel} · ${euros(totalPrice)}`;
  goStep(3);
}

/* ============ CONFIRM BOOKING ============ */
async function confirmarReserva(){
  const nombre = document.getElementById('f-nombre').value.trim();
  const telefono = document.getElementById('f-telefono').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const notas = document.getElementById('f-notas').value.trim();

  if(!nombre || !telefono){ showToast('Indica tu nombre y teléfono'); return; }
  const chosen = chosenServices();
  if(chosen.length===0 || !bookingState.date || !bookingState.time){ showToast('Faltan datos de la reserva'); return; }

  document.getElementById('btn-confirmar').disabled = true;
  try{
    let clientId;
    const existing = await cliCol.where('phone','==',telefono).limit(1).get();
    if(existing.empty){
      const ref = await cliCol.add({ name:nombre, phone:telefono, email:email||'', notes:'', createdAt:new Date().toISOString() });
      clientId = ref.id;
    } else {
      clientId = existing.docs[0].id;
      await cliCol.doc(clientId).update({ name:nombre, ...(email?{email}:{}) });
    }

    const totalPrice = chosen.reduce((a,s)=>a+Number(s.precio||0),0);
    const totalDuration = chosen.reduce((a,s)=>a+Number(s.duracion||0),0);
    const serviceNames = chosen.map(s=>s.nombre).join(', ');
    const dayBookings = bookings.filter(b=>b.date===bookingState.date && b.status!=='cancelada');
    const t = toMinutes(bookingState.time);
    let employee = bookingState.employee;
    if(!employee || employee==='cualquiera'){
      employee = empList().find(e=>employeeFreeAt(e, t, totalDuration, dayBookings)) || empList()[0];
    }

    await bkCol.add({
      clientId,
      clientName: nombre,
      clientPhone: telefono,
      services: chosen.map(s=>({ id:s.id, name:s.nombre, price:s.precio, duration:s.duracion })),
      serviceName: serviceNames,
      price: totalPrice,
      date: bookingState.date,
      time: bookingState.time,
      duration: totalDuration,
      employee,
      status: 'confirmada',
      notes: notas,
      paid: false,
      createdAt: new Date().toISOString()
    });

    const d = new Date(bookingState.date+'T00:00:00');
    document.getElementById('confirm-text').textContent =
      `${serviceNames} · ${fmtDateLabel(d)} a las ${bookingState.time} con ${employee}. Te esperamos, ${nombre.split(' ')[0]}.`;
    goStep(4);
    showToast('Reserva guardada');
  }catch(e){
    console.error(e);
    showToast('No se pudo guardar la reserva, revisa la conexión');
  }
  document.getElementById('btn-confirmar').disabled = false;
}

function resetBooking(){
  bookingState = { serviceIds:[], date:null, time:null, employee:'cualquiera' };
  categoryFilter = 'todas';
  document.getElementById('f-nombre').value='';
  document.getElementById('f-telefono').value='';
  document.getElementById('f-email').value='';
  document.getElementById('f-notas').value='';
  renderCatFilter();
  renderServiceCards();
  updateSvcSelectionBar();
  renderDateStrip();
  goStep(1);
}
</script>
